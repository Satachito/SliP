name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: C++ tests
        run: sh C++Test/ci.sh

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.16
      - run: sh WASM/build.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: WASM smoke test
        run: node WASM/smoke.mjs
